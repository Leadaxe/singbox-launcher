name: Issue Triage (Claude)

# AI-триаж входящих issue: агент читает текст issue, при необходимости изучает
# код репозитория и существующие issue, затем вешает подходящий лейбл, пишет
# вывод комментарием и закрывает дубликаты / уже реализованное / мусор.
#
# АВТО-ЗАКРЫТИЕ ВКЛЮЧЕНО: агент сам закрывает issue, которые являются
# дубликатами, описывают уже реализованную функциональность, либо бессмысленны
# (спам/invalid). Валидные новые баги и запросы он оставляет открытыми.
# Чтобы вернуться в безопасный режим — убери `Bash(gh issue close:*)` из
# --allowedTools и запрети закрытие в промпте.
#
# Авторизация: OAuth-токен подписки Claude (Pro/Max), не платный API-ключ.
#   1. Локально: claude setup-token  → получите токен sk-ant-oat...
#   2. gh secret set CLAUDE_CODE_OAUTH_TOKEN --repo Leadaxe/singbox-launcher --body "<токен>"
#   3. Установите GitHub App "Claude": https://github.com/apps/claude
#
# Расход идёт в рамках лимитов подписки. Минуты GitHub Actions — как обычно.

on:
  issues:
    types: [opened, reopened]

# Минимально необходимые права. contents:read — чтобы агент мог изучать код.
# id-token:write — обязательно для claude-code-action (OIDC-аутентификация).
permissions:
  contents: read
  issues: write
  pull-requests: read
  id-token: write

# Не запускать параллельно несколько триажей по одному и тому же issue.
concurrency:
  group: issue-triage-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  triage:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Claude triage
        uses: anthropics/claude-code-action@v1
        with:
          # Вход по подписке Max/Pro (не anthropic_api_key):
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Ты — триаж-бот репозитория singbox-launcher (GUI-лаунчер sing-box на Go).
            Тебе передан issue #${{ github.event.issue.number }} с заголовком
            "${{ github.event.issue.title }}".

            Действуй по шагам:

            1. Прочитай тело issue (gh issue view ${{ github.event.issue.number }}).

            2. ОЦЕНКА ПО ЗДРАВОМУ СМЫСЛУ. Сначала пойми, осмыслен ли тикет
               (любой свой комментарий пиши по правилу языка из шага 3 —
               только русский или английский):
               - Это спам, реклама, набор бессвязных слов или пустышка?
                 → повесь лейбл "invalid", вежливо объясни и ЗАКРОЙ issue.
               - Текст невозможно понять / не хватает данных для любого вывода?
                 → повесь лейбл "question", вежливо попроси уточнить
                   (что именно не работает, версия приложения, ОС, шаги) и
                   ОСТАВЬ открытым.
               - Тикет осмыслен → переходи к шагу 3.

            3. ВЫБЕРИ ЯЗЫК ОТВЕТА — только русский или английский, других не
               используй. Если тикет написан по-русски → отвечай по-русски.
               Во всех остальных случаях (английский или любой другой язык,
               либо язык не определить) → отвечай по-английски.

            4. Если запрос про функциональность — изучи код репозитория, чтобы
               проверить, реализована ли она. Полезные места:
                 - bin/wizard_template.json   (настройки визарда: TUN, proxy-in, DNS и т.п.)
                 - core/config/, core/template/ (генерация config.json)
                 - ui/                          (интерфейс)
                 - docs/, README.md, README_RU.md
               НЕ выдумывай настройки — утверждай только то, что нашёл в коде.

            5. Проверь дубликаты среди открытых и закрытых issue:
               gh issue list --state all --search "<ключевые слова>"

            6. Прими решение и выполни (комментарий — на языке из шага 3):

               • Функция УЖЕ реализована → напиши короткую инструкцию, как ею
                 воспользоваться (со ссылками на конкретные настройки/файлы),
                 повесь лейбл "enhancement" и ЗАКРОЙ issue
                 (gh issue close N --reason completed).

               • Это ДУБЛИКАТ → укажи номер оригинала, повесь лейбл "duplicate"
                 и ЗАКРОЙ issue (gh issue close N --reason "not planned").

               • Валидный новый запрос / баг → повесь подходящий лейбл
                 (enhancement / bug / question / documentation), добавь краткий
                 комментарий с выводом для мейнтейнера и ОСТАВЬ открытым.

            7. Всегда вежливо. В конце комментария добавляй строку курсивом
               (на языке ответа), что это автоматический триаж и решение можно
               пересмотреть / переоткрыть.

            ВАЖНО про закрытие: закрывай ТОЛЬКО дубликаты, уже реализованное и
            явный мусор (invalid). Любой правдоподобный новый баг или запрос —
            НЕ закрывай, оставляй мейнтейнеру. Сомневаешься — НЕ закрывай.

            Доступные лейблы репозитория: bug, documentation, duplicate,
            enhancement, good first issue, help wanted, invalid, question, wontfix.
            Не создавай новых лейблов.

            Используй gh CLI для всех действий с issue.
          # Авто-закрытие разрешено: добавлен `gh issue close`.
          claude_args: |
            --allowedTools "Bash(gh issue view:*),Bash(gh issue list:*),Bash(gh issue comment:*),Bash(gh issue edit:*),Bash(gh issue close:*),Bash(gh search:*),Bash(gh label list:*),Read,Grep,Glob"
            --max-turns 25
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
