name: Issue Triage (Claude)

# AI-триаж входящих issue: агент читает текст issue, при необходимости изучает
# код репозитория и существующие issue, затем вешает подходящий лейбл и пишет
# краткий вывод комментарием.
#
# БЕЗОПАСНЫЙ РЕЖИМ (по умолчанию): агент НЕ закрывает issue сам — только
# комментирует и навешивает лейблы. Когда убедитесь в качестве работы,
# разрешите авто-закрытие — см. блок "АВТО-ЗАКРЫТИЕ" в prompt ниже.
#
# Авторизация: OAuth-токен подписки Claude (Pro/Max), не платный API-ключ.
#   1. Локально: claude setup-token  → получите токен sk-ant-oat...
#   2. gh secret set CLAUDE_CODE_OAUTH_TOKEN --repo Leadaxe/singbox-launcher --body "<токен>"
#   3. Установите GitHub App "Claude": https://github.com/apps/claude
#
# Расход идёт в рамках лимитов подписки. Минуты GitHub Actions — как обычно.

on:
  issues:
    types: [opened, reopened]

# Минимально необходимые права. contents:read — чтобы агент мог изучать код.
# id-token:write — обязательно для claude-code-action (OIDC-аутентификация).
permissions:
  contents: read
  issues: write
  pull-requests: read
  id-token: write

# Не запускать параллельно несколько триажей по одному и тому же issue.
concurrency:
  group: issue-triage-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  triage:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Claude triage
        uses: anthropics/claude-code-action@v1
        with:
          # Вход по подписке Max/Pro (не anthropic_api_key):
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Ты — триаж-бот репозитория singbox-launcher (GUI-лаунчер sing-box на Go).
            Тебе передан issue #${{ github.event.issue.number }} с заголовком
            "${{ github.event.issue.title }}".

            Действуй по шагам:

            1. Прочитай тело issue (gh issue view ${{ github.event.issue.number }}).

            2. Если запрос про функциональность — изучи код репозитория, чтобы
               проверить, реализована ли она. Полезные места:
                 - bin/wizard_template.json   (настройки визарда: TUN, proxy-in, DNS и т.п.)
                 - core/config/, core/template/ (генерация config.json)
                 - ui/                          (интерфейс)
                 - docs/, README.md, README_RU.md
               НЕ выдумывай настройки — утверждай только то, что нашёл в коде.

            3. Проверь дубликаты среди открытых и закрытых issue:
               gh issue list --state all --search "<ключевые слова>"

            4. Прими решение и выполни:

               • Функция УЖЕ реализована → напиши на русском короткую инструкцию,
                 как ею воспользоваться (со ссылками на конкретные настройки/файлы),
                 повесь лейбл "enhancement".

               • Это ДУБЛИКАТ → укажи номер оригинала, повесь лейбл "duplicate".

               • Валидный новый запрос / баг → повесь подходящий лейбл
                 (enhancement / bug / question / documentation) и добавь краткий
                 комментарий с твоим выводом для мейнтейнера.

            5. Всегда вежливо и по-русски.

            ВАЖНО — БЕЗОПАСНЫЙ РЕЖИМ: НЕ закрывай issue. Решение о закрытии
            оставляй мейнтейнеру. (Чтобы включить авто-закрытие сделанного и
            дубликатов — разреши команду `gh issue close` в --allowedTools ниже
            и убери это ограничение из промпта.)

            Доступные лейблы репозитория: bug, documentation, duplicate,
            enhancement, good first issue, help wanted, invalid, question, wontfix.
            Не создавай новых лейблов.

            Используй gh CLI для всех действий с issue.
          # Авто-закрытие НЕ разрешено: в списке нет `gh issue close`.
          claude_args: |
            --allowedTools "Bash(gh issue view:*),Bash(gh issue list:*),Bash(gh issue comment:*),Bash(gh issue edit:*),Bash(gh search:*),Bash(gh label list:*),Read,Grep,Glob"
            --max-turns 25
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
